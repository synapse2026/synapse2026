<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techfest Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-box { background: #007bff; color: white; padding: 30px; border-radius: 12px 12px 0 0; text-align: center; }
        .form-label { font-weight: 600; color: #444; }
        .event-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="header-box">
                    <h2>Techfest 2026 Registration</h2>
                    <p>Enter your details to participate</p>
                </div>
                <div class="card-body p-4">
                    <form id="regForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Student Name</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mobile Number</label>
                                <input type="tel" name="mobile" class="form-control" pattern="[0-9]{10}" placeholder="10-digit number" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">College Name</label>
                                <input type="text" name="college" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Department</label>
                                <select name="department" class="form-select" required>
                                    <option value="" selected disabled>Select Dept</option>
                                    <option value="Computer">Computer Science</option>
                                    <option value="Electrical">Electrical</option>
                                    <option value="Mechanical">Mechanical</option>
                                    <option value="Civil">Civil</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Semester</label>
                                <select name="semester" class="form-select" required>
                                    <option value="S1">S1</option><option value="S2">S2</option><option value="S3">S3</option>
                                    <option value="S4">S4</option><option value="S5">S5</option><option value="S6">S6</option>
                                </select>
                            </div>
                        </div>

                        <hr class="my-4">
                        <label class="form-label d-block mb-3">Select Events (Multiple allowed)</label>
                        <div class="event-grid">
                            <div class="form-check">
                                <input class="form-check-input event-check" type="checkbox" value="Paper Presentation">
                                <label class="form-check-label">Paper Presentation</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input event-check" type="checkbox" value="Coding Contest">
                                <label class="form-check-label">Coding Contest</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input event-check" type="checkbox" value="Robotics">
                                <label class="form-check-label">Robo-Wars</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input event-check" type="checkbox" value="Tech Quiz">
                                <label class="form-check-label">Tech Quiz</label>
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-primary w-100 mt-4 py-2 fw-bold">Register Now</button>
                    </form>
                    
                    <div id="successMsg" class="alert alert-success mt-4 d-none">
                        🎉 Registration Successful! We'll contact you soon.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwKjrjjrV5hJUrqaP5nWjYAW2HW50y6EI3_k9bfzriS8ktMuAHpYe1i8K6IyPFV-jsndA/exec'; // PASTE YOUR URL HERE
    const form = document.getElementById('regForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting...";

        // Collect Multi-select checkbox values
        const selectedEvents = Array.from(document.querySelectorAll('.event-check:checked'))
                                    .map(cb => cb.value);

        const data = {
            name: form.name.value,
            mobile: form.mobile.value,
            email: form.email.value,
            college: form.college.value,
            department: form.department.value,
            semester: form.semester.value,
            events: selectedEvents
        };

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(data) 
        })
        .then(() => {
            form.reset();
            form.classList.add('d-none');
            document.getElementById('successMsg').classList.remove('d-none');
        })
        .catch(error => {
            alert("Error: " + error.message);
            submitBtn.disabled = false;
        });
    });
</script>
</body>
</html>
